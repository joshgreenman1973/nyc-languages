<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I live in New York City - in every language</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Noto+Serif+Bengali:wght@300;400;700&family=Noto+Serif+Devanagari:wght@300;400;700&family=Noto+Serif+Georgian:wght@300;400;700&family=Noto+Serif+Greek:wght@300;400;700&family=Noto+Serif+Gujarati:wght@300;400;700&family=Noto+Serif+Gurmukhi:wght@300;400;700&family=Noto+Serif+Hebrew:wght@300;400;700&family=Noto+Serif+JP:wght@300;400;700&family=Noto+Serif+KR:wght@300;400;700&family=Noto+Serif+SC:wght@300;400;700&family=Noto+Serif+TC:wght@300;400;700&family=Noto+Serif+Thai:wght@300;400;700&family=Noto+Serif+Tibetan:wght@300;400;700&family=Noto+Serif+Armenian:wght@300;400;700&family=Noto+Serif+Ethiopic:wght@300;400;700&family=Noto+Sans+Arabic:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060b;
    color: #ffffff;
    height: 100vh;
    overflow: hidden;
    font-family: 'Cormorant Garamond', 'Noto Serif', serif;
  }

  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 28px 40px 20px;
    z-index: 10;
    background: linear-gradient(to bottom, #06060b 40%, transparent);
    pointer-events: none;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .header p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.2);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  #stage {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .cloud-group {
    position: absolute;
    will-change: transform;
  }

  .lang-item {
    position: absolute;
    white-space: nowrap;
    cursor: default;
    will-change: transform;
  }

  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 20px 40px 24px;
    z-index: 10;
    background: linear-gradient(to top, #06060b 40%, transparent);
    pointer-events: none;
  }

  .footer p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255,255,255,0.18);
    line-height: 1.7;
    letter-spacing: 0.3px;
  }

  .tooltip {
    position: fixed;
    background: rgba(12, 12, 20, 0.92);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'Cormorant Garamond', serif;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .tooltip .lang-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .tooltip .lang-detail {
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>"I live in New York City"</h1>
  <p>In the languages New Yorkers speak at home, sized by number of speakers</p>
</div>

<div id="stage">
  <div class="cloud-group" id="cloud"></div>
</div>

<div class="footer">
  <p>
    Data: U.S. Census Bureau, American Community Survey (2022 estimates) for New York City<br>
    Over 600 languages are spoken across the five boroughs, making it the most linguistically diverse city on Earth.
  </p>
</div>

<div class="tooltip" id="tooltip">
  <div class="lang-name"></div>
  <div class="lang-detail"></div>
</div>

<script>

  { lang: "Hebrew",             speakers: 40000,   text: "\u05D0\u05E0\u05D9 \u05D2\u05E8 \u05D1\u05E0\u05D9\u05D5 \u05D9\u05D5\u05E8\u05E7 \u05E1\u05D9\u05D8\u05D9.", font: "'Noto Serif Hebrew', serif" },
  { lang: "Gujarati",           speakers: 38000,   text: "\u0AB9\u0AC1\u0A82 \u0AA8\u0ACD\u0AAF\u0AC1 \u0AAF\u0ACB\u0AB0\u0ACD\u0A95 \u0AB8\u0ABF\u0A9F\u0AC0\u0AAE\u0ABE\u0A82 \u0AB0\u0AB9\u0AC1\u0A82 \u0A9B\u0AC1\u0A82.", font: "'Noto Serif Gujarati', serif" },
  { lang: "Japanese",           speakers: 35000,   text: "\u79C1\u306F\u30CB\u30E5\u30FC\u30E8\u30FC\u30AF\u5E02\u306B\u4F4F\u3093\u3067\u3044\u307E\u3059\u3002", font: "'Noto Serif JP', serif" },
  { lang: "Portuguese",         speakers: 33000,   text: "Eu moro na cidade de Nova York.",                 font: "'Cormorant Garamond', serif" },
  { lang: "German",             speakers: 28000,   text: "Ich lebe in New York City.",                      font: "'Cormorant Garamond', serif" },
  { lang: "Punjabi",            speakers: 27000,   text: "\u0A2E\u0A48\u0A02 \u0A28\u0A3F\u0A0A \u0A2F\u0A3E\u0A30\u0A15 \u0A38\u0A3F\u0A1F\u0A40 \u0A35\u0A3F\u0A71\u0A1A \u0A30\u0A39\u0A3F\u0A70\u0A26\u0A3E \u0A39\u0A3E\u0A02\u0964", font: "'Noto Serif Gurmukhi', serif" },
  { lang: "Albanian",           speakers: 26000,   text: "Un\u00eb jetoj n\u00eb New York City.",           font: "'Cormorant Garamond', serif" },
  { lang: "Vietnamese",         speakers: 24000,   text: "T\u00f4i s\u1ed1ng \u1edf th\u00e0nh ph\u1ed1 New York.", font: "'Cormorant Garamond', serif" },
  { lang: "Yoruba",             speakers: 22000,   text: "Mo \u0144 gb\u00e9 n\u00ed \u00ecl\u00fa New York.", font: "'Cormorant Garamond', serif" },
  { lang: "Ukrainian",          speakers: 20000,   text: "\u042F \u0436\u0438\u0432\u0443 \u0432 \u041D\u044C\u044E-\u0419\u043E\u0440\u043A\u0443.", font: "'Noto Serif', serif" },
  { lang: "Turkish",            speakers: 18000,   text: "New York\u2019ta ya\u015f\u0131yorum.",           font: "'Cormorant Garamond', serif" },
  { lang: "Thai",               speakers: 16000,   text: "\u0E09\u0E31\u0E19\u0E2D\u0E32\u0E28\u0E31\u0E22\u0E2D\u0E22\u0E39\u0E48\u0E43\u0E19\u0E19\u0E34\u0E27\u0E22\u0E2D\u0E23\u0E4C\u0E01\u0E0B\u0E34\u0E15\u0E35\u0E49", font: "'Noto Serif Thai', serif" },
  { lang: "Tibetan",            speakers: 15000,   text: "\u0F44\u0F0B\u0F49\u0F72\u0F0B\u0F61\u0F7C\u0F42\u0F0B\u0F42\u0FB2\u0F7C\u0F44\u0F0B\u0F41\u0FB1\u0F62\u0F0B\u0F53\u0F44\u0F0B\u0F66\u0FA1\u0F7C\u0F51\u0F0B\u0F40\u0FB1\u0F72\u0F0B\u0F61\u0F7C\u0F51\u0F0D", font: "'Noto Serif Tibetan', serif" },
  { lang: "Romanian",           speakers: 14000,   text: "Locuiesc \u00een ora\u0219ul New York.",          font: "'Cormorant Garamond', serif" },
  { lang: "Wolof",              speakers: 13000,   text: "Dama d\u00ebkk ci New York City.",                font: "'Cormorant Garamond', serif" },
  { lang: "Amharic",            speakers: 12000,   text: "\u1260\u1292\u12CD \u12EE\u122D\u12AD \u12A8\u1270\u121B \u12A5\u1296\u122B\u1208\u1201\u1362", font: "'Noto Serif Ethiopic', serif" },
  { lang: "Armenian",           speakers: 11000,   text: "\u0535\u057D \u0561\u057A\u0580\u0578\u0582\u0574 \u0565\u0574 \u0546\u0575\u0578\u0582 \u0545\u0578\u0580\u0584\u0578\u0582\u0574:", font: "'Noto Serif Armenian', serif" },
  { lang: "Nepali",             speakers: 10000,   text: "\u092E \u0928\u094D\u092F\u0942\u092F\u094B\u0930\u094D\u0915 \u0936\u0939\u0930\u092E\u093E \u092C\u0938\u094D\u091B\u0941\u0964", font: "'Noto Serif Devanagari', serif" },
  { lang: "Georgian",           speakers: 8000,    text: "\u10DB\u10D4 \u10D5\u10EA\u10EE\u10DD\u10D5\u10E0\u10DD\u10D1 \u10DC\u10D8\u10E3-\u10D8\u10DD\u10E0\u10D9\u10E8\u10D8.", font: "'Noto Serif Georgian', serif" },
  { lang: "Garifuna",           speakers: 5000,    text: "Niduhetiwa le New York City.",                    font: "'Cormorant Garamond', serif" },
  { lang: "Uzbek",              speakers: 4500,    text: "Men Nyu-York shahrida yashayman.",                font: "'Cormorant Garamond', serif" },
  { lang: "Igbo",               speakers: 4000,    text: "Ebi m na obodo New York.",                        font: "'Cormorant Garamond', serif" },
  { lang: "Bukharian",          speakers: 3500,    text: "\u041C\u0430\u043D \u0434\u0430\u0440 \u0448\u0430\u04B3\u0440\u0438 \u041D\u044E \u0419\u043E\u0440\u043A \u0437\u0438\u043D\u0434\u0430\u0433\u0438 \u043C\u0435\u043A\u0443\u043D\u0430\u043C.", font: "'Noto Serif', serif" },
];

// ==========================================================
// Interlocking animated word cloud
// ==========================================================

const stage = document.getElementById('stage');
const cloud = document.getElementById('cloud');
const tooltip = document.getElementById('tooltip');
const maxSpeakers = languages[0].speakers;
const minFont = 13;
const maxFont = 72;

function fontSize(speakers) {
  const ratio = Math.sqrt(speakers) / Math.sqrt(maxSpeakers);
  return minFont + ratio * (maxFont - minFont);
}

const palette = [
  [255, 255, 255],
  [235, 220, 255],
  [200, 190, 255],
  [170, 175, 255],
  [140, 170, 240],
  [115, 185, 220],
  [100, 200, 195],
  [110, 210, 165],
  [130, 215, 140],
  [160, 220, 130],
];

function getColor(index, total) {
  const t = index / (total - 1);
  const i = Math.min(Math.floor(t * (palette.length - 1)), palette.length - 2);
  const frac = t * (palette.length - 1) - i;
  const c1 = palette[i], c2 = palette[i + 1];
  const r = Math.round(c1[0] * (1 - frac) + c2[0] * frac);
  const g = Math.round(c1[1] * (1 - frac) + c2[1] * frac);
  const b = Math.round(c1[2] * (1 - frac) + c2[2] * frac);
  return `rgb(${r},${g},${b})`;
}

// Placed bounding boxes for collision detection
const placed = []; // { x, y, w, h }
const items = [];   // DOM items with animation data
const GAP = 4;      // pixels between items

function overlaps(rect) {
  for (const p of placed) {
    if (rect.x < p.x + p.w + GAP &&
        rect.x + rect.w + GAP > p.x &&
        rect.y < p.y + p.h + GAP &&
        rect.y + rect.h + GAP > p.y) {
      return true;
    }
  }
  return false;
}

// Spiral placement: start from center, spiral outward
function spiralPlace(w, h) {
  let angle = Math.random() * Math.PI * 2;
  let radius = 0;
  const step = 3;
  const angleStep = 0.3;
  const maxRadius = Math.max(window.innerWidth, window.innerHeight);

  while (radius < maxRadius) {
    const x = Math.cos(angle) * radius - w / 2;
    const y = Math.sin(angle) * radius - h / 2;
    const rect = { x, y, w, h };

    if (!overlaps(rect)) {
      return rect;
    }

    angle += angleStep;
    radius += step / (2 * Math.PI);
  }

  // Fallback
  return { x: Math.random() * 200 - 100, y: Math.random() * 200 - 100, w, h };
}

function init() {
  cloud.innerHTML = '';
  placed.length = 0;
  items.length = 0;

  // Create and measure all elements, then place via spiral
  const elements = languages.map((l, i) => {
    const size = fontSize(l.speakers);
    const el = document.createElement('div');
    el.className = 'lang-item';
    el.textContent = l.text;
    el.style.fontFamily = l.font;
    el.style.fontSize = size + 'px';
    el.style.fontWeight = size > 40 ? '300' : '400';
    el.style.letterSpacing = size > 30 ? '0.5px' : '0';
    el.style.color = getColor(i, languages.length);
    el.style.opacity = 0.35 + 0.65 * (size / maxFont);
    el.style.left = '0px';
    el.style.top = '0px';
    el.style.visibility = 'hidden';
    cloud.appendChild(el);
    return { el, l, i, size };
  });

  // Force layout to measure
  const rects = elements.map(({ el }) => {
    const r = el.getBoundingClientRect();
    return { w: r.width, h: r.height };
  });

  // Place each item using spiral packing
  elements.forEach(({ el, l, i, size }, idx) => {
    const { w, h } = rects[idx];
    const pos = spiralPlace(w, h);
    placed.push(pos);

    el.style.visibility = 'visible';

    // Each item gets a unique gentle oscillation
    const wobbleSpeedX = 0.0002 + Math.random() * 0.0004;
    const wobbleSpeedY = 0.00015 + Math.random() * 0.00035;
    const wobbleAmpX = 3 + Math.random() * 8;
    const wobbleAmpY = 2 + Math.random() * 6;
    const phaseX = Math.random() * Math.PI * 2;
    const phaseY = Math.random() * Math.PI * 2;

    items.push({
      el,
      baseX: pos.x,
      baseY: pos.y,
      wobbleSpeedX,
      wobbleSpeedY,
      wobbleAmpX,
      wobbleAmpY,
      phaseX,
      phaseY,
      lang: l.lang,
      speakers: l.speakers,
    });

    // Tooltip
    el.addEventListener('mouseenter', () => {
      tooltip.style.opacity = '1';
      tooltip.querySelector('.lang-name').textContent = l.lang;
      tooltip.querySelector('.lang-detail').textContent =
        l.speakers.toLocaleString() + ' speakers in NYC';
      el.style.opacity = '1';
    });
    el.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
      el.style.opacity = 0.35 + 0.65 * (size / maxFont);
    });
    el.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 8) + 'px';
    });
  });

  // Compute cloud bounding box and center it
  const cloudBounds = computeCloudBounds();
  cloudOffsetX = (window.innerWidth / 2) - (cloudBounds.cx);
  cloudOffsetY = (window.innerHeight / 2) - (cloudBounds.cy);
}

let cloudOffsetX = 0;
let cloudOffsetY = 0;

function computeCloudBounds() {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (let i = 0; i < placed.length; i++) {
    const p = placed[i];
    if (p.x < minX) minX = p.x;
    if (p.x + p.w > maxX) maxX = p.x + p.w;
    if (p.y < minY) minY = p.y;
    if (p.y + p.h > maxY) maxY = p.y + p.h;
  }
  return {
    minX, maxX, minY, maxY,
    cx: (minX + maxX) / 2,
    cy: (minY + maxY) / 2,
    w: maxX - minX,
    h: maxY - minY,
  };
}

// Global slow drift for the whole cloud
let globalPhase = 0;
const globalDriftAmpX = 20;
const globalDriftAmpY = 12;
const globalDriftSpeedX = 0.00008;
const globalDriftSpeedY = 0.00006;

function animate(time) {
  globalPhase = time;

  // Global cloud drift
  const gx = Math.sin(time * globalDriftSpeedX) * globalDriftAmpX;
  const gy = Math.cos(time * globalDriftSpeedY * 0.7) * globalDriftAmpY;

  for (const item of items) {
    // Individual wobble
    const wx = Math.sin(time * item.wobbleSpeedX + item.phaseX) * item.wobbleAmpX;
    const wy = Math.cos(time * item.wobbleSpeedY + item.phaseY) * item.wobbleAmpY;

    const x = item.baseX + cloudOffsetX + gx + wx;
    const y = item.baseY + cloudOffsetY + gy + wy;

    item.el.style.transform = `translate(${x}px, ${y}px)`;
  }

  requestAnimationFrame(animate);
}

// Wait for fonts, then go
document.fonts.ready.then(() => {
  init();
  requestAnimationFrame(animate);
});

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(init, 300);
});
</script>

</body>
</html>
